<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interattivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Comic Neue', cursive, sans-serif;
            background: #fff;
            background-image: 
                radial-gradient(circle, #000 1px, transparent 1px),
                radial-gradient(circle, #000 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #000;
            min-height: 100vh;
        }
        
        header {
            background: linear-gradient(135deg, #ffdd00 0%, #ffa502 100%);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 8px solid #000;
        }
        
        h1 { 
            font-family: 'Bangers', cursive;
            color: #000;
            font-size: 3.5em;
            text-shadow: 3px 3px 0 #fff;
            letter-spacing: 3px;
        }
        
        .back { 
            display: inline-block;
            color: #000;
            text-decoration: none;
            margin-top: 15px;
            padding: 10px 25px;
            background: #fff;
            border: 4px solid #000;
            font-weight: bold;
            box-shadow: 4px 4px 0 #000;
            transition: all 0.2s;
        }
        
        .back:hover { 
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .category-select {
            background: #fff;
            padding: 30px;
            border: 5px solid #000;
            box-shadow: 8px 8px 0 #000;
            margin-bottom: 30px;
        }
        
        .category-select h2 {
            font-family: 'Bangers', cursive;
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .cat-btn {
            padding: 20px;
            font-size: 1.2em;
            font-family: 'Bangers', cursive;
            border: 4px solid #000;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }
        
        .cat-btn:hover {
            transform: scale(1.05);
        }
        
        .cat-math { border-color: #ff3366; }
        .cat-math:hover, .cat-math.active { background: #ff3366; color: #fff; }
        
        .cat-geo { border-color: #00d4ff; }
        .cat-geo:hover, .cat-geo.active { background: #00d4ff; }
        
        .cat-fisica { border-color: #00c853; }
        .cat-fisica:hover, .cat-fisica.active { background: #00c853; color: #fff; }
        
        .quiz-container {
            background: #fff;
            padding: 30px;
            border: 5px solid #000;
            box-shadow: 8px 8px 0 #000;
            display: none;
        }
        
        .quiz-container.active {
            display: block;
        }
        
        .progress-bar {
            background: #ddd;
            height: 30px;
            border: 3px solid #000;
            margin-bottom: 25px;
            position: relative;
        }
        
        .progress-fill {
            background: #00c853;
            height: 100%;
            transition: width 0.3s;
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        
        .question {
            font-size: 1.5em;
            margin-bottom: 25px;
            padding: 20px;
            background: #f0f0f0;
            border: 3px solid #000;
            text-align: center;
        }
        
        .options {
            display: grid;
            gap: 15px;
        }
        
        .option {
            padding: 20px;
            font-size: 1.2em;
            border: 4px solid #000;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        
        .option:hover {
            background: #ffdd00;
            transform: translateX(10px);
        }
        
        .option.correct {
            background: #00c853;
            color: #fff;
        }
        
        .option.wrong {
            background: #ff3366;
            color: #fff;
        }
        
        .option.disabled {
            pointer-events: none;
        }
        
        .score-display {
            font-family: 'Bangers', cursive;
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #000;
            color: #fff;
        }
        
        .result-container {
            text-align: center;
            padding: 40px;
        }
        
        .result-container h2 {
            font-family: 'Bangers', cursive;
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        .result-score {
            font-size: 5em;
            font-family: 'Bangers', cursive;
            margin: 30px 0;
        }
        
        .result-message {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            padding: 15px 40px;
            font-size: 1.3em;
            font-family: 'Bangers', cursive;
            background: #000;
            color: #fff;
            border: 4px solid #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .restart-btn:hover {
            background: #ffdd00;
            color: #000;
        }
        
        .timer {
            font-family: 'Bangers', cursive;
            font-size: 2em;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #ff3366;
            color: #fff;
            border: 3px solid #000;
        }
        
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e3f2fd;
            border: 3px solid #00d4ff;
            display: none;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-box {
            padding: 20px;
            background: #f0f0f0;
            border: 3px solid #000;
        }
        
        .stat-box h3 {
            font-family: 'Bangers', cursive;
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        
        .stat-box p {
            font-size: 2em;
            font-family: 'Bangers', cursive;
        }
    </style>
</head>
<body>
    <header>
        <h1>QUIZ TIME!</h1>
        <p style="font-size: 1.3em; margin-top: 10px;">★ Metti alla prova le tue conoscenze! ★</p>
        <a href="index.html" class="back">← TORNA ALLA HOME</a>
    </header>

    <div class="container">
        <div class="category-select" id="categorySelect">
            <h2>SCEGLI LA CATEGORIA:</h2>
            <div class="categories">
                <button class="cat-btn cat-math" onclick="startQuiz('matematica')">MATEMATICA</button>
                <button class="cat-btn cat-geo" onclick="startQuiz('geometria')">GEOMETRIA</button>
                <button class="cat-btn cat-fisica" onclick="startQuiz('fisica')">FISICA</button>
                <button class="cat-btn" style="border-color: #9c27b0;" onclick="startQuiz('misto')">MISTO</button>
            </div>
        </div>

        <div class="quiz-container" id="quizContainer">
            <div class="score-display">
                Punteggio: <span id="score">0</span> / <span id="totalQuestions">10</span>
            </div>
            
            <div class="timer" id="timer">⏱ 30</div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
                <span class="progress-text" id="progressText">1/10</span>
            </div>
            
            <div class="question" id="question"></div>
            
            <div class="options" id="options"></div>
            
            <div class="explanation" id="explanation"></div>
        </div>

        <div class="quiz-container" id="resultContainer" style="display: none;">
            <div class="result-container">
                <h2>RISULTATO FINALE!</h2>
                <div class="result-score" id="finalScore"></div>
                <div class="result-message" id="resultMessage"></div>
                
                <div class="stats">
                    <div class="stat-box">
                        <h3>CORRETTE</h3>
                        <p id="correctCount" style="color: #00c853;">0</p>
                    </div>
                    <div class="stat-box">
                        <h3>SBAGLIATE</h3>
                        <p id="wrongCount" style="color: #ff3366;">0</p>
                    </div>
                    <div class="stat-box">
                        <h3>TEMPO</h3>
                        <p id="totalTime">0s</p>
                    </div>
                </div>
                
                <button class="restart-btn" onclick="restartQuiz()">GIOCA ANCORA!</button>
            </div>
        </div>
    </div>

    <script>
        const questions = {
            matematica: [
                { q: "Quanto fa 15 × 8?", options: ["120", "130", "115", "125"], correct: 0, exp: "15 × 8 = 120" },
                { q: "Quanto vale √144?", options: ["11", "12", "13", "14"], correct: 1, exp: "12² = 144, quindi √144 = 12" },
                { q: "Quanto fa 2⁵?", options: ["16", "32", "64", "128"], correct: 1, exp: "2⁵ = 2×2×2×2×2 = 32" },
                { q: "Qual è il MCD di 12 e 18?", options: ["3", "6", "9", "2"], correct: 1, exp: "I divisori comuni sono 1, 2, 3, 6. Il massimo è 6." },
                { q: "Quanto fa (3 + 4) × 2?", options: ["10", "14", "11", "12"], correct: 1, exp: "(3+4)×2 = 7×2 = 14" },
                { q: "Quanto vale 25% di 80?", options: ["15", "20", "25", "30"], correct: 1, exp: "25% = 1/4, quindi 80÷4 = 20" },
                { q: "Quanto fa -5 + (-3)?", options: ["-8", "-2", "2", "8"], correct: 0, exp: "-5 + (-3) = -8" },
                { q: "Qual è la soluzione di 3x = 12?", options: ["x = 3", "x = 4", "x = 36", "x = 15"], correct: 1, exp: "3x = 12 → x = 12/3 = 4" },
                { q: "Quanto fa 7² + 3²?", options: ["52", "58", "100", "10"], correct: 1, exp: "7² + 3² = 49 + 9 = 58" },
                { q: "Quanto vale π approssimato a 2 decimali?", options: ["3.12", "3.14", "3.16", "3.18"], correct: 1, exp: "π ≈ 3.14159 ≈ 3.14" }
            ],
            geometria: [
                { q: "Quanti gradi ha un triangolo?", options: ["90°", "180°", "270°", "360°"], correct: 1, exp: "La somma degli angoli interni di un triangolo è sempre 180°" },
                { q: "Qual è l'area di un quadrato di lato 5?", options: ["20", "25", "10", "15"], correct: 1, exp: "A = l² = 5² = 25" },
                { q: "Quanti lati ha un esagono?", options: ["5", "6", "7", "8"], correct: 1, exp: "Esagono = 6 lati (esa = sei in greco)" },
                { q: "Qual è la circonferenza di un cerchio di raggio 7? (usa π≈22/7)", options: ["44", "22", "154", "14"], correct: 0, exp: "C = 2πr = 2×(22/7)×7 = 44" },
                { q: "Quanti vertici ha un cubo?", options: ["6", "8", "12", "4"], correct: 1, exp: "Un cubo ha 8 vertici" },
                { q: "Qual è il perimetro di un rettangolo 6×4?", options: ["10", "20", "24", "12"], correct: 1, exp: "P = 2×(6+4) = 20" },
                { q: "Quanto vale l'area di un triangolo con base 10 e altezza 6?", options: ["60", "30", "16", "32"], correct: 1, exp: "A = (b×h)/2 = (10×6)/2 = 30" },
                { q: "Quanti angoli retti ha un rettangolo?", options: ["2", "3", "4", "0"], correct: 2, exp: "Un rettangolo ha 4 angoli retti (90°)" },
                { q: "Qual è il volume di un cubo di lato 3?", options: ["9", "18", "27", "36"], correct: 2, exp: "V = l³ = 3³ = 27" },
                { q: "Quanto vale la diagonale di un quadrato di lato 1?", options: ["1", "√2", "2", "√3"], correct: 1, exp: "d = l×√2 = 1×√2 = √2" }
            ],
            fisica: [
                { q: "Qual è l'unità di misura della forza?", options: ["Joule", "Newton", "Watt", "Pascal"], correct: 1, exp: "La forza si misura in Newton (N)" },
                { q: "Quanto vale g sulla Terra circa?", options: ["9.81 m/s²", "10.5 m/s²", "8.5 m/s²", "11.2 m/s²"], correct: 0, exp: "g ≈ 9.81 m/s²" },
                { q: "Quale formula rappresenta l'energia cinetica?", options: ["F=ma", "Ec=½mv²", "Ep=mgh", "P=W/t"], correct: 1, exp: "Ec = ½mv²" },
                { q: "Qual è la velocità della luce circa?", options: ["3×10⁶ m/s", "3×10⁸ m/s", "3×10¹⁰ m/s", "3×10⁵ m/s"], correct: 1, exp: "c ≈ 3×10⁸ m/s" },
                { q: "Quanto vale la formula E=mc²?", options: ["Newton", "Einstein", "Galileo", "Bohr"], correct: 1, exp: "E=mc² fu formulata da Einstein" },
                { q: "Qual è l'unità della potenza?", options: ["Joule", "Newton", "Watt", "Pascal"], correct: 2, exp: "La potenza si misura in Watt (W)" },
                { q: "La terza legge di Newton parla di:", options: ["Inerzia", "F=ma", "Azione-Reazione", "Gravità"], correct: 2, exp: "La III legge: ad ogni azione corrisponde una reazione uguale e contraria" },
                { q: "Quanto vale il calore specifico dell'acqua?", options: ["4186 J/kg·K", "1000 J/kg·K", "500 J/kg·K", "2000 J/kg·K"], correct: 0, exp: "c_acqua ≈ 4186 J/(kg·K)" },
                { q: "Quale grandezza si misura in Pascal?", options: ["Forza", "Pressione", "Energia", "Potenza"], correct: 1, exp: "Il Pascal (Pa) è l'unità della pressione" },
                { q: "Nella formula V=RI, cosa è I?", options: ["Tensione", "Resistenza", "Corrente", "Potenza"], correct: 2, exp: "I = corrente elettrica (Ampere)" }
            ]
        };

        let currentCategory = '';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timer = null;
        let timeLeft = 30;
        let totalTime = 0;
        let correctAnswers = 0;

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function startQuiz(category) {
            currentCategory = category;
            
            if (category === 'misto') {
                currentQuestions = shuffleArray([
                    ...questions.matematica.slice(0, 3),
                    ...questions.geometria.slice(0, 4),
                    ...questions.fisica.slice(0, 3)
                ]);
            } else {
                currentQuestions = shuffleArray(questions[category]);
            }
            
            currentQuestionIndex = 0;
            score = 0;
            totalTime = 0;
            correctAnswers = 0;
            
            document.getElementById('categorySelect').style.display = 'none';
            document.getElementById('quizContainer').classList.add('active');
            document.getElementById('resultContainer').style.display = 'none';
            
            document.getElementById('totalQuestions').textContent = currentQuestions.length;
            
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showResults();
                return;
            }

            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').textContent = q.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = `${String.fromCharCode(65 + index)}) ${opt}`;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('progressText').textContent = 
                `${currentQuestionIndex + 1}/${currentQuestions.length}`;
            document.getElementById('progressFill').style.width = 
                `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%`;
            
            document.getElementById('score').textContent = score;
            document.getElementById('explanation').style.display = 'none';
            
            startTimer();
        }

        function startTimer() {
            timeLeft = 30;
            document.getElementById('timer').textContent = `⏱ ${timeLeft}`;
            
            if (timer) clearInterval(timer);
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `⏱ ${timeLeft}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    checkAnswer(-1);
                }
            }, 1000);
        }

        function checkAnswer(selected) {
            clearInterval(timer);
            
            const q = currentQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, index) => {
                opt.classList.add('disabled');
                if (index === q.correct) {
                    opt.classList.add('correct');
                } else if (index === selected && selected !== q.correct) {
                    opt.classList.add('wrong');
                }
            });
            
            if (selected === q.correct) {
                score++;
                correctAnswers++;
            }
            
            totalTime += (30 - timeLeft);
            
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('explanation').innerHTML = 
                `<strong>Spiegazione:</strong> ${q.exp}`;
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 2000);
        }

        function showResults() {
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultContainer').style.display = 'block';
            
            const percentage = Math.round((score / currentQuestions.length) * 100);
            
            document.getElementById('finalScore').textContent = `${percentage}%`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('wrongCount').textContent = currentQuestions.length - score;
            document.getElementById('totalTime').textContent = `${totalTime}s`;
            
            let message = '';
            if (percentage >= 90) message = 'ECCELLENTE! Sei un genio!';
            else if (percentage >= 70) message = 'OTTIMO LAVORO!';
            else if (percentage >= 50) message = 'DISCRETO! Continua così!';
            else message = 'SERVONO PIÙ ESERCIZIO!';
            
            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('categorySelect').style.display = 'block';
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultContainer').style.display = 'none';
        }
    </script>
</body>
</html>
