<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italiano - MAST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Comic Neue', cursive, sans-serif; background: #fff5f6; background-image: radial-gradient(circle, #fd79a8 1px, transparent 1px), radial-gradient(circle, #74b9ff 1px, transparent 1px); background-size: 30px 30px; background-position: 0 0, 15px 15px; color: #2d3436; min-height: 100vh; }
        header { background: linear-gradient(135deg, #a29bfe 0%, #fd79a8 100%); padding: 25px 20px; text-align: center; border-bottom: 6px solid #2d3436; position: relative; }
        header::before { content: '★ ITALIANO ★'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #2d3436; color: #fff; padding: 5px 20px; font-family: 'Bangers', cursive; font-size: 1em; border: 3px solid #fff; }
        h1 { font-family: 'Bangers', cursive; color: #fff; font-size: 3.5em; text-shadow: 4px 4px 0 #2d3436; letter-spacing: 3px; }
        .back { display: inline-block; color: #2d3436; text-decoration: none; margin-top: 15px; padding: 10px 25px; background: #fff; border: 4px solid #2d3436; font-weight: bold; box-shadow: 5px 5px 0 #2d3436; transition: all 0.2s; }
        .back:hover { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #2d3436; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .nav-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .nav-tabs button { padding: 12px 25px; background: #fff; border: 4px solid #2d3436; font-family: 'Bangers', cursive; font-size: 1.1em; cursor: pointer; transition: all 0.2s; box-shadow: 4px 4px 0 #2d3436; }
        .nav-tabs button.active { background: #a29bfe; color: #fff; transform: translate(2px, 2px); box-shadow: 2px 2px 0 #2d3436; }
        .nav-tabs button:hover { background: #fd79a8; color: #fff; }
        .tool { background: #fff; padding: 30px; margin-bottom: 30px; border: 5px solid #2d3436; box-shadow: 10px 10px 0 #2d3436; position: relative; }
        .tool h2 { font-family: 'Bangers', cursive; font-size: 2em; margin-bottom: 20px; background: #fdcb6e; color: #2d3436; padding: 10px 20px; display: inline-block; border: 3px solid #2d3436; transform: rotate(-2deg); }
        .tool label { display: block; font-weight: bold; margin: 15px 0 8px; font-size: 1.1em; }
        .tool input, .tool select, .tool textarea { width: 100%; padding: 12px; font-size: 1.1em; border: 3px solid #2d3436; font-family: inherit; background: #fff; }
        .tool button { margin-top: 15px; padding: 15px 30px; font-size: 1.2em; font-family: 'Bangers', cursive; background: #2d3436; color: #fff; border: 4px solid #2d3436; cursor: pointer; transition: all 0.2s; letter-spacing: 2px; }
        .tool button:hover { background: #a29bfe; transform: scale(1.05); }
        .result { margin-top: 15px; padding: 15px; background: #2d3436; color: #fff; border: 4px solid #a29bfe; font-size: 1.2em; text-align: center; }
        .quiz-section { background: #00cec9; padding: 30px; margin-bottom: 30px; border: 5px solid #2d3436; box-shadow: 10px 10px 0 #2d3436; }
        .quiz-section h2 { font-family: 'Bangers', cursive; font-size: 2.2em; margin-bottom: 20px; color: #fff; text-shadow: 3px 3px 0 #2d3436; }
        .quiz-question { background: #fff; padding: 20px; margin: 15px 0; border: 4px solid #2d3436; font-size: 1.2em; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .quiz-btn { padding: 15px; background: #fff; border: 3px solid #2d3436; font-family: 'Bangers', cursive; font-size: 1em; cursor: pointer; transition: all 0.2s; }
        .quiz-btn:hover { background: #fdcb6e; transform: scale(1.02); }
        .quiz-btn.correct { background: #00b894; color: #fff; }
        .quiz-btn.wrong { background: #d63031; color: #fff; }
        .game-section { background: #fdcb6e; padding: 30px; margin-bottom: 30px; border: 5px solid #2d3436; box-shadow: 10px 10px 0 #2d3436; }
        .game-section h2 { font-family: 'Bangers', cursive; font-size: 2.2em; margin-bottom: 20px; color: #2d3436; text-shadow: 2px 2px 0 #fff; }
        .score-display { font-family: 'Bangers', cursive; font-size: 2em; color: #fff; background: #2d3436; padding: 10px 20px; display: inline-block; margin-bottom: 20px; border: 3px solid #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .example { background: #ffeaa7; padding: 15px; border-left: 5px solid #fd79a8; margin: 15px 0; }
        .example h4 { font-family: 'Bangers', cursive; color: #2d3436; margin-bottom: 10px; font-size: 1.3em; }
    </style>
</head>
<body>
    <header>
        <h1>ITALIANO!</h1>
        <p style="color: #fff; font-size: 1.3em; text-shadow: 2px 2px 0 #2d3436;">Grammatica, Quiz e Giochi!</p>
        <a href="index.html" class="back">← TORNA ALLA HOME</a>
    </header>

    <div class="container">
        <div class="nav-tabs">
            <button onclick="showTab('grammatica')" class="active">GRAMMATICA</button>
            <button onclick="showTab('quiz')">QUIZ!</button>
            <button onclick="showTab('giochi')">GIOCHI</button>
        </div>

        <div id="grammatica" class="tab-content active">
            <div class="tool">
                <h2>CONIUGATORE VERBI</h2>
                <label>Verbo (amare, temere, partire):</label>
                <input type="text" id="verbo" placeholder="Es: amare">
                <label>Tempo:</label>
                <select id="tempo">
                    <option value="presente">Presente</option>
                    <option value="imperfetto">Imperfetto</option>
                    <option value="passato_prossimo">Passato Prossimo</option>
                    <option value="futuro">Futuro Semplice</option>
                </select>
                <button onclick="coniuga()">CONIUGA!</button>
                <div id="coniugazione" class="result" style="display: none;"></div>
            </div>

            <div class="tool">
                <h2>ANALISI GRAMMATICALE</h2>
                <label>Parola da analizzare:</label>
                <input type="text" id="parola" placeholder="Es: bellissimi">
                <button onclick="analisiGrammaticale()">ANALIZZA</button>
                <div id="analisi-gramm" class="result" style="display: none;"></div>
                <div class="example">
                    <h4>Esempi disponibili:</h4>
                    <p>bellissimi, libro, correndo, velocemente, casa, bello</p>
                </div>
            </div>

            <div class="tool">
                <h2>ANALISI LOGICA</h2>
                <label>Frase semplice:</label>
                <input type="text" id="frase-logica" placeholder="Es: Mario mangia la mela">
                <button onclick="analisiLogica()">ANALIZZA</button>
                <div id="analisi-log" class="result" style="display: none;"></div>
            </div>
        </div>

        <div id="quiz" class="tab-content">
            <div class="quiz-section">
                <h2>Quiz Italiano!</h2>
                <div class="score-display">Punteggio: <span id="quiz-score">0</span></div>
                
                <div id="quiz-container"></div>
                
                <button onclick="startQuiz()" style="padding: 15px 30px; background: #fdcb6e; color: #2d3436; border: 4px solid #2d3436; font-family: 'Bangers'; font-size: 1.3em; cursor: pointer; margin-top: 20px;">NUOVO QUIZ!</button>
            </div>
        </div>

        <div id="giochi" class="tab-content">
            <div class="game-section">
                <h2>GIOCO: COMPLETA LA FRASE!</h2>
                <div style="background: #fff; padding: 20px; border: 4px solid #2d3436;">
                    <p id="phrase-question" style="font-size: 1.5em; text-align: center; margin-bottom: 15px;"></p>
                    <div id="phrase-options" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>
                    <p id="phrase-result" style="margin-top: 15px; font-size: 1.3em; text-align: center;"></p>
                </div>
                <button onclick="startPhraseGame()" style="margin-top: 15px; padding: 15px 30px; background: #a29bfe; color: #fff; border: 4px solid #2d3436; font-family: 'Bangers'; font-size: 1.2em; cursor: pointer;">NUOVA FRASE!</button>
            </div>

            <div class="game-section" style="background: #fd79a8;">
                <h2>GIOCO: SINONIMI E CONTRARI!</h2>
                <div style="background: #fff; padding: 20px; border: 4px solid #2d3436;">
                    <p id="syn-question" style="font-size: 1.5em; text-align: center; margin-bottom: 15px;"></p>
                    <div id="syn-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                    <p id="syn-result" style="margin-top: 15px; font-size: 1.3em; text-align: center;"></p>
                </div>
                <button onclick="startSynGame()" style="margin-top: 15px; padding: 15px 30px; background: #00cec9; color: #fff; border: 4px solid #2d3436; font-family: 'Bangers'; font-size: 1.2em; cursor: pointer;">NUOVA PAROLA!</button>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function coniuga() {
            const verbo = document.getElementById('verbo').value.toLowerCase().trim();
            const tempo = document.getElementById('tempo').value;
            if (!verbo) { alert('Inserisci un verbo!'); return; }
            
            const coniugazioni = {
                'amare': {
                    presente: ['io amo', 'tu ami', 'egli ama', 'noi amiamo', 'voi amate', 'essi amano'],
                    imperfetto: ['io amavo', 'tu amavi', 'egli amava', 'noi amavamo', 'voi amavate', 'essi amavano'],
                    passato_prossimo: ['io ho amato', 'tu hai amato', 'egli ha amato', 'noi abbiamo amato', 'voi avete amato', 'essi hanno amato'],
                    futuro: ['io amerò', 'tu amerai', 'egli amerà', 'noi ameremo', 'voi amerete', 'essi ameranno']
                },
                'temere': {
                    presente: ['io temo', 'tu temi', 'egli teme', 'noi temiamo', 'voi temete', 'essi temono'],
                    imperfetto: ['io temevo', 'tu temevi', 'egli temeva', 'noi temevamo', 'voi temevate', 'essi temevano'],
                    passato_prossimo: ['io ho temuto', 'tu hai temuto', 'egli ha temuto', 'noi abbiamo temuto', 'voi avete temuto', 'essi hanno temuto'],
                    futuro: ['io temerò', 'tu temerai', 'egli temerà', 'noi temeremo', 'voi temerete', 'essi temeranno']
                },
                'partire': {
                    presente: ['io parto', 'tu parti', 'egli parte', 'noi partiamo', 'voi partite', 'essi partono'],
                    imperfetto: ['io partivo', 'tu partivi', 'egli partiva', 'noi partivamo', 'voi partivate', 'essi partivano'],
                    passato_prossimo: ['io sono partito', 'tu sei partito', 'egli è partito', 'noi siamo partiti', 'voi siete partiti', 'essi sono partiti'],
                    futuro: ['io partirò', 'tu partirai', 'egli partirà', 'noi partiremo', 'voi partirete', 'essi partiranno']
                }
            };
            
            let coniugato = coniugazioni[verbo];
            if (coniugato) {
                document.getElementById('coniugazione').style.display = 'block';
                document.getElementById('coniugazione').innerHTML = `<strong>${tempo.replace('_', ' ').toUpperCase()}:</strong><br>` + coniugato[tempo].join('<br>');
            } else {
                document.getElementById('coniugazione').style.display = 'block';
                document.getElementById('coniugazione').innerHTML = 'Verbo non trovato. Prova: amare, temere, partire';
            }
        }

        function analisiGrammaticale() {
            const parola = document.getElementById('parola').value.toLowerCase().trim();
            if (!parola) { alert('Inserisci una parola!'); return; }
            
            const analisi = {
                'bellissimi': 'Aggettivo qualificativo, grado superlativo assoluto, maschile plurale',
                'libro': 'Sostantivo comune, maschile singolare',
                'correndo': 'Verbo, correre, modo gerundio, presente',
                'velocemente': 'Avverbio di modo',
                'casa': 'Sostantivo comune, femminile singolare',
                'bello': 'Aggettivo qualificativo, grado positivo, maschile singolare'
            };
            
            document.getElementById('analisi-gramm').style.display = 'block';
            document.getElementById('analisi-gramm').innerHTML = analisi[parola] || 'Parola non nel database. Prova: bellissimi, libro, correndo...';
        }

        function analisiLogica() {
            const frase = document.getElementById('frase-logica').value.trim();
            if (!frase) { alert('Inserisci una frase!'); return; }
            const parti = frase.split(' ');
            if (parti.length < 3) {
                document.getElementById('analisi-log').style.display = 'block';
                document.getElementById('analisi-log').innerHTML = 'Frase troppo corta!';
                return;
            }
            document.getElementById('analisi-log').style.display = 'block';
            document.getElementById('analisi-log').innerHTML = `<strong>Soggetto:</strong> ${parti[0]}<br><strong>Predicato:</strong> ${parti[1]}<br><strong>Oggetto:</strong> ${parti.slice(2).join(' ')}<br><em>(Analisi semplificata)</em>`;
        }

        // QUIZ
        const quizQuestions = [
            { q: "Qual è il plurale di 'libro'?", options: ["libri", "libra", "libro", "librie"], correct: 0 },
            { q: "Che tipo di parola è 'velocemente'?", options: ["Aggettivo", "Avverbio", "Sostantivo", "Verbo"], correct: 1 },
            { q: "Quale è un verbo irregolare?", options: ["cantare", "essere", "parlare", "mangiare"], correct: 1 },
            { q: "'Molto bello' è:", options: ["Comparativo", "Superlativo relativo", "Superlativo assoluto", "Grado positivo"], correct: 2 },
            { q: "Nella frase 'Mario mangia la mela', chi è il soggetto?", options: ["la mela", "mangia", "Mario", "la"], correct: 2 }
        ];

        let currentQuestion = 0;
        let quizScore = 0;

        function startQuiz() {
            currentQuestion = 0;
            quizScore = 0;
            document.getElementById('quiz-score').textContent = '0';
            showQuestion();
        }

        function showQuestion() {
            const container = document.getElementById('quiz-container');
            if (currentQuestion >= quizQuestions.length) {
                container.innerHTML = `<div style="background: #fff; padding: 30px; border: 4px solid #2d3436; text-align: center;"><h3 style="font-family: 'Bangers'; font-size: 2em;">QUIZ COMPLETATO!</h3><p style="font-size: 1.5em;">Punteggio: ${quizScore}/${quizQuestions.length}</p></div>`;
                return;
            }
            const q = quizQuestions[currentQuestion];
            container.innerHTML = `<div class="quiz-question"><p><strong>Domanda ${currentQuestion + 1}:</strong> ${q.q}</p><div class="quiz-options">${q.options.map((opt, i) => `<button class="quiz-btn" onclick="checkQuiz(${i})">${opt}</button>`).join('')}</div></div>`;
        }

        function checkQuiz(selected) {
            const q = quizQuestions[currentQuestion];
            const buttons = document.querySelectorAll('.quiz-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) btn.classList.add('correct');
                else if (i === selected) btn.classList.add('wrong');
            });
            if (selected === q.correct) {
                quizScore++;
                document.getElementById('quiz-score').textContent = quizScore;
            }
            setTimeout(() => { currentQuestion++; showQuestion(); }, 1500);
        }

        // GIOCHI
        const phrases = [
            { phrase: "Il sole ___ in cielo.", options: ["brilla", "mangia", "dorme", "nuota"], correct: 0 },
            { phrase: "Marco ___ i compiti.", options: ["mangia", "fa", "beve", "guida"], correct: 1 },
            { phrase: "L'acqua ___ nel mare.", options: ["vola", "corre", "nuota", "cammina"], correct: 2 },
            { phrase: "Il gatto ___ il topo.", options: ["insegue", "legge", "scrive", "canta"], correct: 0 }
        ];

        function startPhraseGame() {
            const p = phrases[Math.floor(Math.random() * phrases.length)];
            document.getElementById('phrase-question').textContent = p.phrase;
            document.getElementById('phrase-result').textContent = '';
            document.getElementById('phrase-options').innerHTML = p.options.map(opt => 
                `<button onclick="checkPhrase('${opt}', '${p.options[p.correct]}')" style="padding: 15px 25px; background: #fff; border: 3px solid #2d3436; font-family: 'Bangers'; font-size: 1.1em; cursor: pointer;">${opt}</button>`
            ).join('');
        }

        function checkPhrase(selected, correct) {
            document.getElementById('phrase-result').textContent = selected === correct ? '✓ Corretto!' : `✗ Era: ${correct}`;
            document.getElementById('phrase-result').style.color = selected === correct ? '#00b894' : '#d63031';
        }

        const synonims = [
            { word: "Bello", type: "sinonimo", options: ["Brutto", "Carino", "Cattivo", "Grande"], correct: 1 },
            { word: "Allegro", type: "contrario", options: ["Triste", "Contento", "Felice", "Brillante"], correct: 0 },
            { word: "Piccolo", type: "sinonimo", options: ["Grande", "Minuscolo", "Alto", "Largo"], correct: 1 },
            { word: "Veloce", type: "contrario", options: ["Lento", "Rapido", "Corrente", "Dinamico"], correct: 0 }
        ];

        function startSynGame() {
            const s = synonims[Math.floor(Math.random() * synonims.length)];
            document.getElementById('syn-question').textContent = `Trova il ${s.type} di "${s.word}"`;
            document.getElementById('syn-result').textContent = '';
            document.getElementById('syn-options').innerHTML = s.options.map(opt => 
                `<button onclick="checkSyn('${opt}', '${s.options[s.correct]}')" style="padding: 15px; background: #fff; border: 3px solid #2d3436; font-family: 'Bangers'; font-size: 1em; cursor: pointer;">${opt}</button>`
            ).join('');
        }

        function checkSyn(selected, correct) {
            document.getElementById('syn-result').textContent = selected === correct ? '✓ Corretto!' : `✗ Era: ${correct}`;
            document.getElementById('syn-result').style.color = selected === correct ? '#00b894' : '#d63031';
        }

        startQuiz();
        startPhraseGame();
        startSynGame();
    </script>
</body>
</html>
